<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormPal</title>
  <link href="popup.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">FormPal</h1>
      <span class="tagline">Auto-fill job applications</span>
    </header>

    <!-- Profile Selector Section -->
    <section class="section profile-section">
      <div class="section-header">
        <label for="profileSelect">Active Profile</label>
        <div class="profile-actions">
          <button id="btnBack" class="btn btn-small btn-secondary hidden" title="Go back">
            &#8592; Back
          </button>
          <button id="btnEditProfile" class="btn btn-small btn-secondary hidden" title="Edit selected profile">
            <span class="icon">&#9998;</span> Edit
          </button>
          <button id="btnDeleteProfile" class="btn btn-small btn-danger" title="Delete selected profile">
            <span class="icon">&#128465;</span>
          </button>
          <button id="btnNewProfile" class="btn btn-small btn-primary" title="Create new profile">
            <span class="icon">+</span> New
          </button>
        </div>
      </div>
      <select id="profileSelect" class="select-input">
        <option value="">Select a profile...</option>
      </select>
    </section>

    <!-- Profile Editor (Collapsible) -->
    <section id="profileEditor" class="section editor-section hidden">
      <div class="section-header">
        <h2 id="editorTitle">Create Profile</h2>
        <div class="editor-actions">
          <button id="btnCancelEdit" class="btn btn-small btn-secondary" title="Cancel">
            Cancel
          </button>
          <button id="btnSaveProfile" class="btn btn-small btn-success" title="Save profile">
            Save
          </button>
        </div>
      </div>

      <form id="profileForm" class="profile-form">
        <input type="hidden" id="profileId" value="">

        <!-- Profile Name & Type -->
        <div class="form-row">
          <div class="form-group flex-2">
            <label for="profileName">Profile Name</label>
            <input type="text" id="profileName" class="text-input" placeholder="e.g., Software Developer" required aria-label="Profile name">
          </div>
          <div class="form-group flex-1">
            <label for="profileType">Type</label>
            <select id="profileType" class="select-input" aria-label="Profile type">
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>
        </div>

        <!-- Contact Info -->
        <div class="form-group">
          <label class="section-label">Contact Information</label>
          <div class="form-row">
            <input type="text" id="firstName" class="text-input" placeholder="First Name" aria-label="First name">
            <input type="text" id="lastName" class="text-input" placeholder="Last Name" aria-label="Last name">
          </div>
          <div class="form-row">
            <input type="text" id="preferredName" class="text-input" placeholder="Preferred Name" aria-label="Preferred name">
            <input type="text" id="fullName" class="text-input" placeholder="Full Name" aria-label="Full name">
          </div>
          <div class="form-row">
            <input type="email" id="email" class="text-input" placeholder="Email" aria-label="Email address">
            <input type="tel" id="phone" class="text-input" placeholder="Phone Number" aria-label="Phone number">
          </div>
          <div class="form-row">
            <input type="url" id="linkedIn" class="text-input" placeholder="LinkedIn URL" aria-label="LinkedIn profile URL">
            <input type="url" id="website" class="text-input" placeholder="Website URL" aria-label="Personal website URL">
          </div>
        </div>

        <!-- Address -->
        <div class="form-group">
          <label class="section-label">Address</label>
          <input type="text" id="street" class="text-input" placeholder="Street Address" aria-label="Street address">
          <div class="form-row three-col">
            <input type="text" id="city" class="text-input" placeholder="City" aria-label="City">
            <input type="text" id="state" class="text-input" placeholder="State" aria-label="State">
            <input type="text" id="zipCode" class="text-input" placeholder="ZIP Code" aria-label="ZIP code">
          </div>
          <div class="form-row">
            <input type="text" id="county" class="text-input" placeholder="County" aria-label="County">
            <select id="country" class="select-input" aria-label="Country">
              <option value="">Select Country</option>
              <option value="United States">United States</option>
              <option value="US">US</option>
            </select>
          </div>
        </div>

        <!-- Work Experience -->
        <div class="form-group">
          <div class="section-label-row">
            <label class="section-label">Work Experience</label>
            <button type="button" id="btnAddWork" class="btn btn-add btn-small btn-secondary">
              <span class="icon">+</span> Add Entry
            </button>
          </div>
          <div id="workEntries" class="entries-container">
            <!-- Work entries will be dynamically added here -->
          </div>
        </div>

        <!-- Education -->
        <div class="form-group">
          <div class="section-label-row">
            <label class="section-label">Education</label>
            <button type="button" id="btnAddEducation" class="btn btn-add btn-small btn-secondary">
              <span class="icon">+</span> Add Entry
            </button>
          </div>
          <div id="educationEntries" class="entries-container">
            <!-- Education entries will be dynamically added here -->
          </div>
        </div>

        <!-- Skills -->
        <div class="form-group">
          <label class="section-label">Skills</label>
          <div class="form-row">
            <input type="text" id="skills" class="text-input" placeholder="Skills (comma-separated)" aria-label="Skills">
            <input type="text" id="languages" class="text-input" placeholder="Languages" aria-label="Languages">
            <input type="text" id="certifications" class="text-input" placeholder="Certifications" aria-label="Certifications">
          </div>
        </div>

        <!-- Resume Info -->
        <div class="form-group">
          <label class="section-label">Additional Info</label>
          <textarea id="summary" class="text-input textarea" placeholder="Professional Summary" aria-label="Professional summary"></textarea>
          <input type="text" id="workEligibility" class="text-input" placeholder="Work Eligibility (e.g., US Citizen, H1B)" aria-label="Work eligibility">
          <input type="text" id="salaryExpectations" class="text-input" placeholder="Salary Expectations" aria-label="Salary expectations">
        </div>
      </form>
    </section>

    <!-- Fill Form Button -->
    <section class="section fill-section">
      <button id="btnFillForm" class="btn btn-fill" disabled>
        <span class="icon">&#10003;</span>
        Fill Form on Page
      </button>
      <p id="fillStatus" class="status-message"></p>
    </section>

    <!-- Data Management -->
    <section class="section data-section">
      <div class="data-actions">
        <button id="btnExport" class="btn btn-small btn-secondary" title="Export profiles">
          <span class="icon">&#8599;</span> Export
        </button>
        <button id="btnImport" class="btn btn-small btn-secondary" title="Import profiles">
          <span class="icon">&#8601;</span> Import
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>All data stored locally in Chrome</p>
    </footer>
  </div>

  <!-- Autofill Selection Modal -->
  <div id="autofillModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Select Entry to Fill</h3>
        <button id="modalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modalDescription"></p>
        <div id="modalOptions" class="modal-options">
          <!-- Options will be dynamically added here -->
        </div>
      </div>
      <div class="modal-footer">
        <button id="modalFillAll" class="btn btn-small btn-primary">Fill All</button>
        <button id="modalCancel" class="btn btn-small btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
